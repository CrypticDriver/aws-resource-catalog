schema_version: v1
status: verified
service: secretsmanager
service_code_pricing: AWSSecretsManager
service_code_arn_namespace: secretsmanager

resource_type:
  name: idle_secret
  human_name: Secrets Manager Secret (never accessed)
  human_name_zh: 长期未访问的 Secrets Manager Secret
  cfn: AWS::SecretsManager::Secret
  config: AWS::SecretsManager::Secret
  resource_explorer: AWS::SecretsManager::Secret
  cli_list: aws secretsmanager list-secrets
  boto3:
    client: secretsmanager
    list_method: list_secrets
  arn_pattern: arn:aws:secretsmanager:{region}:{account}:secret:{name}

billing:
  billable: true
  model: complex
  summary: |
    Secrets Manager bills $0.40/secret/month + $0.05/10000 API calls.
    100 forgotten secrets = $40/month silent baseline forever. The
    LastAccessedDate field surfaces the leak: a secret with no
    access in 90+ days is almost certainly safe to delete.
  cur_product_codes:
    - AWSSecretsManager
  cur_usage_type_patterns:
    - "*SM-Secret*"
  free_tier: false
  doc_pricing_page: https://aws.amazon.com/secrets-manager/pricing/

lifecycle:
  parent_resource: null
  retention_caveats:
    - Default 30-day recovery window before permanent delete; can be set to 0 with --force-delete-without-recovery (irreversible).
    - Replicas in other regions follow the primary's deletion.
  doc_lifecycle_anchor: https://docs.aws.amazon.com/secretsmanager/latest/userguide/manage_delete-secret.html

orphan_detection:
  orphan_prone: true
  severity: medium
  rule_human: |
    A secret is orphan when (a) DeletedDate is null AND (b)
    LastAccessedDate is null OR > 90 days ago AND (c) age > 30 days.
    LastAccessedDate updates only on GetSecretValue calls — perfect
    proxy for "is anything reading this".
  rule_pseudocode: |
    for s in list_secrets():
        if s.DeletedDate: continue
        if age(s.CreatedDate) < 30d: continue
        last = s.LastAccessedDate
        if last is None or age(last) > 90d:
            yield Orphan(s)
  cleanup_command: aws secretsmanager delete-secret --secret-id {ARN} --recovery-window-in-days 30
  cleanup_safety: needs_review
  iam_required:
    - secretsmanager:ListSecrets
    - secretsmanager:DeleteSecret

discovery:
  method: aws_api
  latency: realtime
  completeness: complete
  requires_setup: null
  rationale: |
    secretsmanager:ListSecrets returns LastAccessedDate inline.
    No CloudWatch / CUR dependency — the access timestamp is
    authoritative.
  blind_spots: []

tags:
  - billable
  - orphan_prone
  - security
  - quick_win

scan:
  list:
    boto3_client: secretsmanager
    method: list_secrets
    response_path: SecretList
    id_field: ARN
    name_field: Name
    paginated: true
  orphan_check:
    type: custom
    custom_module: shared.scanner_modules.idle_secret:is_orphan
  cost_estimate:
    monthly_usd: 0.40   # $0.40/month per secret
  cleanup:
    boto3_method: delete_secret
    args_template:
      SecretId: "{ARN}"
      RecoveryWindowInDays: 30
    cli_command: aws secretsmanager delete-secret --secret-id {ARN} --recovery-window-in-days 30
    safety: needs_review

verification:
  last_verified: "2026-05-23"
  source_doc_version: secretsmanager-2025
  contributor: goudan@auto
