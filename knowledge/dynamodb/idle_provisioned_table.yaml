schema_version: v1
status: verified
service: dynamodb
service_code_pricing: AmazonDynamoDB
service_code_arn_namespace: dynamodb

resource_type:
  name: idle_provisioned_table
  human_name: DynamoDB Table (PROVISIONED capacity, idle)
  human_name_zh: 空闲的预留容量 DynamoDB 表
  cfn: AWS::DynamoDB::Table
  config: AWS::DynamoDB::Table
  resource_explorer: AWS::DynamoDB::Table
  cli_list: aws dynamodb list-tables
  boto3:
    client: dynamodb
    list_method: list_tables
  arn_pattern: arn:aws:dynamodb:{region}:{account}:table/{name}

billing:
  billable: true
  model: complex
  summary: |
    A PROVISIONED table is billed for its provisioned RCU and WCU
    every hour, regardless of utilization. 1 RCU + 1 WCU = ~$0.40/mo;
    a forgotten dev table provisioned at 25 RCU / 25 WCU (the default)
    is ~$10/mo. ON_DEMAND tables are billed per-request and are NOT
    flagged here.
  cur_product_codes:
    - AmazonDynamoDB
  cur_usage_type_patterns:
    - "*ProvisionedReadCapacity*"
    - "*ProvisionedWriteCapacity*"
  free_tier: true   # 25 RCU + 25 WCU free tier exists, but multiple tables stack
  doc_pricing_page: https://aws.amazon.com/dynamodb/pricing/provisioned/

lifecycle:
  parent_resource: null
  parent_link: |
    Table is a top-level resource. Deleting it stops the meter
    immediately.
  auto_delete_on_parent_delete: false
  retention_after_parent_delete: null
  retention_caveats:
    - DeletionProtection may be enabled — operator must clear it before delete.
    - A safer first action is BillingMode change to PAY_PER_REQUEST (no provisioned charge), reversible.
  doc_lifecycle_anchor: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/HowItWorks.CoreComponents.html

orphan_detection:
  orphan_prone: true
  severity: medium
  rule_human: |
    A PROVISIONED table is idle when (a) BillingModeSummary.BillingMode
    == 'PROVISIONED' AND (b) ConsumedReadCapacityUnits sum == 0 AND
    ConsumedWriteCapacityUnits sum == 0 over the last 30 days AND (c)
    table age > 30 days. Cleanup recommendation is to switch to
    ON_DEMAND (PAY_PER_REQUEST) — reversible and bills at zero when
    truly idle.
  rule_pseudocode: |
    for t in list_tables():
        info = describe_table(t)
        if info.BillingModeSummary.BillingMode != 'PROVISIONED': continue
        if age(info.CreationDateTime) < 30d: continue
        rcu = sum(metric('ConsumedReadCapacityUnits', table=t, 30d))
        wcu = sum(metric('ConsumedWriteCapacityUnits', table=t, 30d))
        if rcu == 0 and wcu == 0:
            yield Orphan(t)
  cleanup_command: aws dynamodb update-table --table-name {TableName} --billing-mode PAY_PER_REQUEST
  cleanup_safety: safe
  iam_required:
    - dynamodb:ListTables
    - dynamodb:DescribeTable
    - cloudwatch:GetMetricStatistics
    - dynamodb:UpdateTable

discovery:
  method: aws_api
  latency: realtime
  completeness: complete
  requires_setup: null
  rationale: |
    dynamodb:ListTables + DescribeTable returns BillingModeSummary
    inline. ConsumedReadCapacityUnits / WriteCapacityUnits are always
    populated for PROVISIONED tables (they emit zero, not nothing).
  blind_spots:
    - "ON_DEMAND tables are excluded by design — they bill per request and have no idle waste."

tags:
  - billable
  - orphan_prone
  - database
  - quick_win

scan:
  list:
    custom_module: shared.scanner_modules.idle_provisioned_table:list_provisioned_tables
    id_field: TableName
    name_field: TableName
  orphan_check:
    type: custom
    custom_module: shared.scanner_modules.idle_provisioned_table:is_orphan
  cost_estimate:
    monthly_usd_per_unit: 0.40   # combined RCU + WCU baseline
    unit_field: ProvisionedUnits
    fallback_monthly_usd: 10.0   # 25 RCU + 25 WCU default
  cleanup:
    cli_command: aws dynamodb update-table --table-name {TableName} --billing-mode PAY_PER_REQUEST
    safety: safe

verification:
  last_verified: "2026-05-23"
  source_doc_version: dynamodb-developerguide-2025
  contributor: goudan@auto
